<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Validasi Tiket A7X</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #111; color: white; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin:0;">A7X JIS 2026</h2>
        <p style="color:#666; font-size:14px;">Masukkan No WhatsApp Terdaftar</p>
        <input type="number" id="wa" placeholder="Contoh: 62812345678">
        <button onclick="check()">CEK STATUS TIKET</button>
        <div id="result"></div>
    </div>

    <script>
        async function check() {
            const wa = document.getElementById('wa').value;
            const res = document.getElementById('result');
            if(!wa) return;

            res.style.display = "block";
            res.innerText = "Mengecek...";
            res.style.background = "#eee"; res.style.color = "#333";

            try {
                // MENGGUNAKAN HTTPS SUBDOMAIN ANDA
                const r = await fetch(`https://iot.anons.biz.id/api/check/${wa}`);
                const d = await r.json();

                if(d.valid) {
                    res.innerText = `✅ VALID\nMember: ${d.nama}`;
                    res.style.background = "#e8f5e9"; res.style.color = "#2e7d32";
                } else {
                    res.innerText = "❌ TIDAK DITEMUKAN";
                    res.style.background = "#ffebee"; res.style.color = "#c62828";
                }
            } catch (e) {
                res.innerText = "Server Error!";
            }
        }
    </script>
</body>
</html>
