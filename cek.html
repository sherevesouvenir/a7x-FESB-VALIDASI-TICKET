<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Tiket A7X Jakarta 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #111; --accent: #d4af37; }
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f0f0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: white; padding: 45px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        h1 { font-family: 'Metamorphous', serif; font-size: 2rem; color: var(--dark); margin: 0; }
        .tagline { font-size: 12px; font-weight: 800; color: #aaa; letter-spacing: 2px; margin-top: 10px; display: block; }
        .input-group { margin-top: 40px; text-align: left; }
        label { font-size: 11px; font-weight: 800; color: #888; margin-left: 5px; }
        input { 
            width: 100%; padding: 16px; margin-top: 10px; border: 2px solid #f0f0f0; 
            border-radius: 15px; box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--dark); outline: none; }
        button { 
            width: 100%; padding: 18px; background: var(--dark); color: white; 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; 
            margin-top: 20px; transition: 0.3s;
        }
        button:hover { background: #333; transform: translateY(-2px); }
        #status { 
            margin-top: 25px; padding: 20px; border-radius: 15px; 
            font-size: 14px; font-weight: 700; display: none; line-height: 1.6;
        }
        .valid { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .invalid { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AVENGED SEVENFOLD</h1>
        <span class="tagline">VALIDASI FESTIVAL B - JIS 2026</span>
        
        <div class="input-group">
            <label>NOMOR WHATSAPP TERDAFTAR</label>
            <input type="number" id="wa-check" placeholder="Contoh: 62812xxx">
            <button onclick="checkTicket()">VERIFIKASI STATUS</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        async function checkTicket() {
            const wa = document.getElementById('wa-check').value;
            const statBox = document.getElementById('status');

            if(!wa) { alert("Masukkan nomor WA!"); return; }

            try {
                statBox.style.display = "block";
                statBox.innerText = "Mengecek data...";
                statBox.className = "";

                const r = await fetch(`http://160.19.166.191:5000/check/${wa}`);
                const d = await r.json();

                if(d.valid) {
                    statBox.className = "valid";
                    statBox.innerText = `✅ TIKET VALID!\nAtas Nama: ${d.nama.toUpperCase()}\nSampai jumpa di moshpit JIS!`;
                } else {
                    statBox.className = "invalid";
                    statBox.innerText = "❌ DATA TIDAK DITEMUKAN\nNomor ini belum terdaftar sebagai pemegang tiket Festival B.";
                }
            } catch(e) {
                statBox.className = "invalid";
                statBox.innerText = "Hubungan ke server terputus.";
            }
        }
    </script>
</body>
</html>
